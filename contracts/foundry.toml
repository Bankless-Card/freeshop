[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
# cancun rather than the foundry default (osaka): universally supported across L1/L2s and
# analysis tooling; nothing here needs post-cancun opcodes
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
fs_permissions = []

[profile.default.fuzz]
runs = 512

[profile.default.invariant]
runs = 128
depth = 64
fail_on_revert = false

[fmt]
line_length = 120

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
